 <script>
    function realisasiView() {
            return {
                dataRealisasi : {
                    shift1Local: 0,
                    shift2Local: 0,
                    shift3Local: 0,
                    shift1Total: 0,
                    Shift2Total: 0,
                    shift3Total: 0,
                    shift1Export: 0,
                    shift2Export: 0,
                    shift3Export: 0
                },
                tableExport: [],
                dataIML:{},
                txtSetFocus: false,
                actionTitle: "",
                actionButton: "",
                destination:"",
                action: "",
                txtBarcode:"",
                txtHP:"",
                result: '',
                html5QrCode: null,

                
                async getData(){
                    let url = serverHosting+"/deliveryIML/realisasi/PM1Roll"
                    Alpine.store('globVar').isLoading = true
                    
                    try{
                        const data = await (await fetch(url, { method: 'GET', 
                            headers: {'Content-Type': 'application/json'} })).json()
                        this.dataRealisasi = data
                        console.log(this.dataRealisasi)
                    }catch(err){
                        console.log(err)
                        notify(err,"danger")
                    }finally{
                        Alpine.store('globVar').isLoading = false
                    }
                        
                },

                async updateData(){
                    let url = serverHosting+"/deliveryIML/updatedataiml"
                    Alpine.store('globVar').isLoading = true
                    
                    try{
                        const data = await (await fetch(url, { method: 'GET', 
                            headers: {'Content-Type': 'application/json'} })).json()
                        if(data){
                            const refreshData = await this.getData()
                        }
                    }catch(err){
                        console.log(err)
                        notify(err,"danger")
                    }finally{
                        Alpine.store('globVar').isLoading = false
                    }
                        
                }
            }
        }
 </script>
