<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Antrian Surat Jalan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs" defer></script>
</head>
<body class="bg-gray-100 p-6" x-data="{
    antrian: [
      {no: '001', surat: 'SJ-2026-001', customer: 'PT ABC', status: 'Menunggu'},
      {no: '002', surat: 'SJ-2026-002', customer: 'PT XYZ', status: 'Diproses'},
      {no: '003', surat: 'SJ-2026-003', customer: 'PT DEF', status: 'Selesai'}
    ]
  }">

  <!-- Header -->
  <h1 class="text-2xl font-bold mb-4">📦 Dashboard Antrian Surat Jalan - Warehouse</h1>

  <!-- Statistik -->
  <div class="grid grid-cols-3 gap-4 mb-6">
    <div class="bg-white shadow rounded p-4">
      <p class="text-gray-500">Total Antrian Hari Ini</p>
      <p class="text-2xl font-bold">25</p>
    </div>
    <div class="bg-white shadow rounded p-4">
      <p class="text-gray-500">Sedang Diproses</p>
      <p class="text-2xl font-bold text-yellow-500">5</p>
    </div>
    <div class="bg-white shadow rounded p-4">
      <p class="text-gray-500">Selesai</p>
      <p class="text-2xl font-bold text-green-600">18</p>
    </div>
  </div>

  <!-- Tabel Antrian -->
  <div class="bg-white shadow rounded overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">No Antrian</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nomor Surat Jalan</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Customer</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        <template x-for="item in antrian" :key="item.no">
          <tr>
            <td class="px-6 py-4" x-text="item.no"></td>
            <td class="px-6 py-4" x-text="item.surat"></td>
            <td class="px-6 py-4" x-text="item.customer"></td>
            <td class="px-6 py-4">
              <span 
                :class="{
                  'text-red-600 font-semibold': item.status === 'Menunggu',
                  'text-yellow-500 font-semibold': item.status === 'Diproses',
                  'text-green-600 font-semibold': item.status === 'Selesai'
                }" 
                x-text="item.status">
              </span>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <!-- Notifikasi -->
  <div class="mt-6 bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-4">
    <p class="font-bold">Notifikasi</p>
    <p>Surat Jalan SJ-2026-002 hampir selesai diproses</p>
  </div>

</body>
</html>
