    <script>
    
      let txtNoIML = document.getElementById("txtNoIML");
      let qrResult = document.getElementById("qr-reader-results");
      //console.log(txtTracking);
      //qr-reader-results
      const html5QrCode = new Html5Qrcode("qr-reader");
      var lastResult = 0
        function openScanner(){
        // Opening the scanner
        //html5QrCode.start({ facingMode: { exact: "environment"} }, config, qrCodeSuccessCallback);
        html5QrCode.start(
            { facingMode: "environment" }, 
            {
                fps: 10, qrbox: {width: 240, height: 120}
            },
            qrCodeMessage => {
                // do something when code is read
                if(lastResult != qrCodeMessage){
                    txtNoIML.value = qrCodeMessage;
                    document.getElementById("btnModalScanClose").click();
                    document.getElementById("btnGetIML").click();
                    closeScanner();
                    lastResult = qrCodeMessage
                }
                console.log(qrCodeMessage);
                
            },
            errorMessage => {
                // parse error, ignore it.
                console.log(errorMessage);
            })
            .catch(err => {
            // Opening the scanner failed.
                console.log(err);
            });
        }
        function closeScanner(){
            html5QrCode.stop().then(ignore => {

            }).catch(err => {
            });
        }


      function myClock() {         
      setTimeout(function() {   
         const d = new Date();
         const n = d.toLocaleString();
         txtDateTime.value = n; 
         myClock();             
      }, 1000)
      }
      //myClock();
      
  </script>
  <script>
    
    function getIML() {
            return {
                dataForm: {
                    noIML: "",
                    noDN: "",
                    nopol: "",
                    namaSupir: "",
                    ekspedisi: "",
                    customer: "",
                    noHP: "",
                    tglIML:""
                },
                buttonText: "Transfer",
                buttonScanText: "Scan Barcode",
                submitDisable: true,
                isExist: false,
                isReady: true,
                loading: false,
                showDetail: false,
                showNotification: false,
                textNotification: "",
                bgNotification: "",
                showTransferForm: true,
                clearForm(){
                    this.dataForm.noDN = ""
                    this.dataForm.noIML = "";
                    this.dataForm.nopol = "";
                    this.dataForm.namaSupir = "";
                    this.dataForm.ekspedisi = "";
                    this.dataForm.customer = "";
                    this.dataForm.tglIML = "";
                    this.dataForm.noHP = "";
                },
                async getByID() {
                    //let token="D03NT_LF5g2y8kJo6ATzKPdIOouHA55WIuc6ax8Ll-u-HdYICpnWgnkub8XIndQ_01JH9SEktK_sS9AfTv61aDmNnRcUxeiG_hgRfSvsM2RaWGfWHVyFUI-tlZyD_DQmNb8KnTlIlhOjKaZZbG2pLJ8zYagC-s1FpKgNLb4-wEFhkxfr1JaUXxiUynJ4WzkL8OtLyCIVDFRn7gjW1Gb6WUXe05azlRcx0hyp3-fFy3jY9Y5kVph4SQctVo8PrRZZHTwFmaOEZ0aIZBU4uixaw2f5Z7pLzihu7pzDxfGUCdagAKTQpC0jhrQqoLKBgfwfc5r_CEUMH4vvcmuN5Zqn52ztiSiZ6TCDAL8lJj52nGeIFpwWtB1aye44OYSaMlfJr6sGGd_hnOvTsAuNBdqxAA"
                    
                    this.submitDisable = true
                    let imlValue = document.getElementById("txtNoIML").value
                    this.isReady = this.getAntrianByIML(imlValue)
                    const FORM_ENDPOINT = `https://www.indahkiat.my.id/check_auth.php?NoIML=` + imlValue;
                    this.loading = true;
                    Alpine.store('globVar').isLoading = true
                    await fetch(FORM_ENDPOINT, {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    })
                    .then(response => {
                        console.log(response.status); // Logs the numerical status code (e.g., 200, 404, 500)
                        
                        return response.json(); // Or .text(), .blob(), etc., depending on content type)
                        })
                    .then(data => {
                        console.log(data);
                        if(data.message == "Data Not Found"){
                            notify(data.message, 'danger');
                        } else {
                            
                            //fillDataForm = (data) =>
                            //{
                                this.dataForm.noDN = data.data.NoDN;
                                this.dataForm.noIML = data.data.NoIML;
                                this.dataForm.nopol = data.data.Nopol;
                                this.dataForm.namaSupir = data.data.NamaSupir;
                                this.dataForm.ekspedisi = data.data.Ekspedisi;
                                this.dataForm.customer = data.data.Customer;
                                this.dataForm.tglIML = data.data.Tanggal;
                            //}
                            //data.data.forEach(element => fillDataForm(element));
                            //this.isReady = this.getAntrianByIML(this.dataForm.noIML)
                            
                        }
                        
                        //this.showNotif("success","Success getting IC data");
                        //this.showTransferForm = true;
                    })
                    .catch(error => {
                    console.error('Error:', error);
                    notify(error, 'danger');
                    
                    // Tangani error di sini
                    })
                    .finally(() => {
                        this.loading = false;
                        Alpine.store('globVar').isLoading = false
                        
                    });
                },
                getAntrianByIML(noIML){
                    
                    this.isExist = false
                    templateQueryFilter= {
                                            "structuredQuery": {
                                                "select": {
                                                    "fields": [{
                                                        "fieldPath": "NoIML"
                                                        }]
                                                },
                                                "from": [{
                                                    "collectionId": "stayingtime",
                                                    "allDescendants": true
                                                }],
                                                "where": {
                                                    "fieldFilter": {
                                                        "field": {
                                                            "fieldPath": "NoIML"
                                                        },
                                                        "op": "EQUAL",
                                                        "value": {
                                                            "integerValue": 0,
                                                        }
                                                    }
                                                }
                                            }
                                        }
                        templateQueryFilter.structuredQuery.where.fieldFilter.value.integerValue = parseInt(noIML)

                        return fetch(`https://firestore.googleapis.com/v1/projects/fg-ikk/databases/(default)/documents:runQuery`, {
                            method: 'POST',
                            headers: { 
                                    'Content-Type': 'application/json' 
                            },
                            body: JSON.stringify(templateQueryFilter)
                        })
                        .then((res) => {
                            //console.log(res) 
                            return res.json()
                            
                        }) 
                        .then(data => {
                            
                            //console.log(data);

                            if(this.isExist){
                                notify("Sudah pernah daftar", 'danger');
                                this.submitDisable = true
                                return false
                            }
                            this.submitDisable = false
                            return true

                    }

                                },

                                },

                                },
                                "OperatorGI": {
                                "stringValue": ""
                                },

                                },

                                }
                            }
                        }
                    
                    await fetch(`https://firestore.googleapis.com/v1/projects/fg-ikk/databases/(default)/documents/stayingtime`, {
                        method: 'POST',
                        headers: { 
                                //'Authorization': `Bearer ${getFireToken()}`,
                                'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify(postedObject)
                    })
                    .then(res => res.json()) 
                    .then(data => {
                        console.log(data)
                        notify("Daftar Sukses", 'success');
                        this.clearForm()
                    })                    
                    .catch(error => {
                        console.error('Error:', error);
                        notify(error, 'danger');
                    })
                    .finally(() => {
                            Alpine.store('globVar').isLoading = false
                            this.submitDisable = true
                    });
                    
                }
            }
        }
                    
  </script>
